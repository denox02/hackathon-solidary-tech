apiVersion: apps/v1
kind: Deployment
metadata:
  name: ngo-service
  namespace: default
  labels:
    app: ngo-service
    project: solidary-tech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ngo-service
  template:
    metadata:
      labels:
        app: ngo-service
    spec:
      containers:
      - name: ngo-service
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/ngo-service:latest
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: solidary-tech-config
              key: DATABASE_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: solidary-tech-config
              key: DATABASE_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: solidary-tech-config
              key: DATABASE_NAME
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: solidary-tech-config
              key: DATABASE_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: solidary-tech-secrets
              key: DATABASE_PASSWORD
        
        # Monitoramento de Saúde do Container (Health Checks)
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: ngo-service
  namespace: default
  labels:
    app: ngo-service
spec:
  type: ClusterIP # IP estável visível apenas dentro do cluster
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: ngo-service
