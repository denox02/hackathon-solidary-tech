apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: solidary-tech-api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: solidary-tech-api
  minReplicas: 1
  maxReplicas: 3 # Casado com o tamanho máximo do seu Node Group (FinOps)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80