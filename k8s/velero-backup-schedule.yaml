apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: solidary-tech-daily-backup
  namespace: velero
  labels:
    project: solidary-tech
    component: disaster-recovery
spec:
  # Cron Expression: Executa todos os dias à meia-noite (00:00 UTC)
  schedule: "0 0 * * *"
  
  # Mantém os backups guardados por 30 dias (720 horas) antes de expirar (FinOps)
  template:
    ttl: 720h0m0s
    
    # Inclui todos os recursos do namespace default (onde estão nossas APIs)
    includedNamespaces:
    - default
    
    # Armazenamento persistente configurado na AWS (Bucket S3 dedicado de DR)
    storageLocation: default
    
    # Garante o backup dos volumes persistentes (se houver dados locais de ONGs)
    snapshotVolumes: true
    
    hooks:
      resources: []
