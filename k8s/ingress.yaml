apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: solidary-tech-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/ngos
        pathType: Prefix
        backend:
          service:
            name: ngo-service
            port:
              number: 3000

      - path: /api/donations
        pathType: Prefix
        backend:
          service:
            name: donation-service
            port:
              number: 3000

      - path: /api/volunteers
        pathType: Prefix
        backend:
          service:
            name: volunteer-service
            port:
              number: 3000
