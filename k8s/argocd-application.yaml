apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solidary-tech-gitops
  namespace: argocd
  labels:
    project: solidary-tech
spec:
  project: default
  source:
    repoURL: 'https://github.com/denox02/hackathon-solidary-tech.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
