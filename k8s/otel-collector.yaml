apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: production
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:

    processors:
      batch:
        timeout: 10s

    exporters:
      # --- INTEGRAÇĂO COM DATADOG APM ---
      datadog:
        api:
          key: "${DD_API_KEY}"
        site: "datadoghq.com" 

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [datadog]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [datadog]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:latest
        env:
        - name: DD_API_KEY
          valueFrom:
            secretKeyRef:
              name: solidary-tech-secrets
              key: DATADOG_API_KEY
        volumeMounts:
        - name: collector-config-vol
          mountPath: /etc/otelcol-contrib
      volumes:
      - name: collector-config-vol
        configMap:
          name: otel-collector-config
          items:
          - key: config.yaml
            path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: production
spec:
  type: ClusterIP
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
  selector:
    app: otel-collector