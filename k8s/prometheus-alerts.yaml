apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: solidary-tech-aiops-alerts
  namespace: default
  labels:
    role: alert-rules
    project: solidary-tech
spec:
  groups:
  - name: solidary-tech-sre-rules
    rules:
    
    # 1. DETECÇĂO PREDITIVA (AIOps): Previsăo de esgotamento de disco antes de acontecer
    - alert: DiskSpaceFillingPredictive
      expr: predict_linear(node_filesystem_free_bytes{job="node-exporter"}[1h], 28800) < 0
      for: 15m
      labels:
        severity: warning
        tier: itsm
      annotations:
        summary: "Previsăo de esgotamento de disco no nó do cluster"
        description: "Com base no comportamento de escrita das últimas horas, o disco deve atingir 100% de capacidade nas próximas 8 horas. Açăo preventiva necessária."

    # 2. SEVERIDADE DE SRE (Hot Path): Taxa de erro crítica estourando o Error Budget do SLO
    - alert: DonationServiceHighErrorRate
      expr: sum(rate(http_requests_total{app="donation-service", status=~"5.."}[5m])) / sum(rate(http_requests_total{app="donation-service"}[5m])) * 100 > 1
      for: 2m
      labels:
        severity: critical
        tier: sre
      annotations:
        summary: "Taxa de erro HTTP acima de 1% no Hot Path (donation-service)"
        description: "O serviço de doaçőes está apresentando uma taxa de erro de 5xx maior que 1% nos últimos 2 minutos. Risco imediato de violaçăo do SLO."

    # 3. ANOMALIA DE LATĘNCIA: Lentidăo extrema na resposta das doaçőes
    - alert: DonationServiceLatencyViolation
      expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{app="donation-service"}[5m])) by (le)) > 2.0
      for: 5m
      labels:
        severity: warning
        tier: sre
      annotations:
        summary: "Latęncia P95 do donation-service acima de 2 segundos"
        description: "95% das requisiçőes de doaçőes estăo levando mais de 2 segundos para processar. Impacto na experięncia do doador detectado pelo pipeline de telemetria."
