apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: donation-service-hpa
  namespace: production
  labels:
    app: donation-service
    project: solidary-tech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: donation-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  # 1. Escalonamento por utilizaçăo de CPU
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # 2. Escalonamento por utilizaçăo de Memória (Proteçăo contra OOM Kill)
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80 # Escala se a média de RAM passar de 80%
