apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solidary-tech-ecosystem
  namespace: argocd
  labels:
    project: solidary-tech
spec:
  project: default
  source:
    # URL do seu repositório oficial do Hackathon
    repoURL: 'https://github.com/denismoreno/hackathon-solidary-tech.git'
    targetRevision: HEAD
    path: k8s # Aponta para a pasta onde salvamos nossos manifestos YAML
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default # Namespace de destino das nossas aplicações

  # Políticas de Sincronização e Autocorreção (Self-Healing)
  syncPolicy:
    automated:
      prune: true     # Remove automaticamente recursos deletados no Git
      selfHeal: true  # Desfaz automaticamente qualquer alteração manual feita direto no cluster
    syncOptions:
      - CreateNamespace=true # Garante a criação do namespace se ele não existir
